</head>

<body>

<div id="content">

    <!-- Small label -->
    <div id="pageLabel">
        A PARTING THOUGHT
    </div>

    <!-- Poem -->
    <div id="poemContainer">

        <div class="line">
            To think about you is blue, like wandering
        </div>

        <div class="line">
            through a golden forest in the middle of the day:
        </div>

        <div class="line">
            gardens are born from my words
        </div>

        <div class="line">
            and with my clouds, I walk through your dreams.
        </div>

    </div>

    <!-- Credit -->
    <div id="credit">
        POETRY BY EDUARDO CARRANZA FROM "AZUL DE TI".
    </div>

    <!-- Instruction -->
    <div id="instruction">
        PRESS &amp; HOLD TO CALM THE STORM
    </div>

</div>

</body>
